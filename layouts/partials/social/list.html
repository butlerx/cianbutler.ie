<ul class="social">
  {{ range . }}
    <li>
      <a href="{{ .url }}" aria-label="{{ .network }} link">
        {{ if eq .network "email" }}
          {{ partial "svg-icon" "envelope" }}
        {{ else if eq .network "github" }}
          {{ partial "svg-icon" "github-alt" }}
        {{ else }}
          {{ partial "svg-icon" .network }}
        {{ end }}
        <span class="label">{{ .network }}</span>
      </a>
    </li>
  {{ end }}
</ul>
